name: Test Build and Publish

on:
  push:
    branches: [ master, main ] # Triggers on push to your active branch

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches the project requirements

      - name: Build Frontend Client
        run: |
          cd client
          npm ci
          echo "VITE_APIURL=/api/v1" > .env.production # Matches upstream build logic
          npm run build
        # This creates the client/dist folder required by the Dockerfile

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image as 'test' in your GHCR namespace
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          platforms: linux/amd64,linux/arm64 # Supports both your server and Pi
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
